name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install buildozer cython==0.29.36
      - name: Build APK
        run: |
          mkdir -p YDownloader
          cp main.py YDownloader/
          cd YDownloader
          python3 -c "
          spec = open('buildozer.spec', 'w')
          spec.write('[app]\n')
          spec.write('title = Y-Downloader Pro\n')
          spec.write('package.name = ydownloaderpro\n')
          spec.write('package.domain = org.ydownloader\n')
          spec.write('source.dir = .\n')
          spec.write('source.include_exts = py,png,jpg,kv,atlas\n')
          spec.write('version = 1.0\n')
          spec.write('requirements = python3,kivy==2.3.0,kivymd==1.1.1,yt-dlp,certifi,charset-normalizer,urllib3,requests,mutagen,pycryptodomex,websockets\n')
          spec.write('orientation = portrait\n')
          spec.write('fullscreen = 0\n')
          spec.write('android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE\n')
          spec.write('android.api = 33\n')
          spec.write('android.minapi = 21\n')
          spec.write('android.ndk = 25b\n')
          spec.write('android.sdk = 33\n')
          spec.write('android.accept_sdk_license = True\n')
          spec.write('android.archs = arm64-v8a\n')
          spec.write('[buildozer]\n')
          spec.write('log_level = 2\n')
          spec.write('warn_on_root = 1\n')
          spec.close()
          "
          echo "y" | buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: YDownloader-APK
          path: YDownloader/bin/*.apk
