name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip3 install buildozer cython==0.29.33
      - name: Build APK
        run: |
          echo "y" | buildozer android debug
          find . -name "*.apk" 2>/dev/null
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YDownloader-APK
          path: .buildozer/android/platform/build-arm64-v8a/dists/**/*.apk
