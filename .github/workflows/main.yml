name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install buildozer cython==0.29.36
      - name: Build APK
        run: |
          mkdir -p YDownloader
          cp main.py YDownloader/
          cd YDownloader
          printf '[app]\ntitle = Y-Downloader Pro\npackage.name = ydownloaderpro\npackage.domain = org.ydownloader\nsource.dir = .\nsource.include_exts = py,png,jpg,kv,atlas\nversion = 1.0\nrequirements = pyth
