name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential ccache
          pip3 install buildozer==1.5.0 cython==0.29.33
      - name: Build APK
        run: |
          echo "y" | buildozer android debug
          find . -name "*.apk"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YDownloader-APK
          path: bin/*.apk
          if-no-files-found: warn
